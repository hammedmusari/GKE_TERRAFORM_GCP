apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
	name: my-app
spec:
	replicas: 2
	revisionHistoryLimit: 2
	selector:
		matchLabels:
			app: my-app
	template:
		metadata:
			labels:
				app: my-app
		spec:
			containers:
				- name: my-app
					image: my-app:latest
					ports:
						- containerPort: 8080
	strategy:
		blueGreen:
			activeService: service-active
			previewService: service-preview
			autoPromotionEnabled: false
